
<!-- gener -->
    <div class="gener-container" *ngFor="let gener of movieGener; let index= index;">

        <!-- gener title -->
            <h2 class="gener-title">{{ gener.name }}</h2>
        <!-- gener title -->

        <!-- movie slider -->
            <div class="movie-slider-container" >

                <!-- movie -->
                    <div class="movie-container" *ngFor="let movie of moviesList[index].movies;" (click)="openMedia(movie)">

                        <picture>
                            <img class="movie-backdrop" src="https://image.tmdb.org/t/p/w400{{ movie.backdrop_path }}" alt="movie.title" >
                        </picture>
                        
                        <!-- movie details -->
                            <div class="movie-details-container">

                                <h3 class="movie-title">{{ movie.title }}</h3>

                            </div>
                        <!-- movie details -->

                    </div>
                <!-- movie -->

            </div>
        <!-- movie slider -->

    </div>
<!-- gener -->
