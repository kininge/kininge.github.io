
<!-- media detail -->
    <div id="movie-detail-container">

        <!-- media image -->
            <picture>
                <img id="backdrop-image" src="https://image.tmdb.org/t/p/original/{{ movie.backdrop_path }}" alt="movie.title" srcset="">
            </picture>
        <!-- media image -->

        <!-- media detail -->
            <div id="media-detail-container">

                <!-- media title -->
                    <h2 id="media-title">{{ movie.title }}</h2>
                <!-- media title -->

                <!-- media overview -->
                    <p id="media-overview">{{ movie.overview }}</p>
                <!-- media overview -->

                <!-- media other details -->
                    <div id="media-other-details-container">

                        <table>

                            <tr>
                                <td>Release date</td>
                                <td>{{ movie.release_date | dateConvertion }}</td>
                            </tr>
                            <tr>
                                <td>Language</td>
                                <td>
                                    <span *ngFor="let lang of movie.spoken_languages; let index= index;">
                                        {{ lang.english_name }}
                                        <span *ngIf="index< (movie.spoken_languages.length- 1)">, </span>
                                    </span>
                                </td>
                            </tr>
                            <tr>
                                <td>Popularity</td>
                                <td>{{ movie.popularity }}</td>
                            </tr>
                            <tr>
                                <td>Revenue</td>
                                <td>${{ movie.revenue }}</td>
                            </tr>

                        </table>

                    </div>
                <!-- media other details -->

            </div>
        <!-- media detail -->

    </div>
<!-- media detail -->
